<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESI Jardins - A tese de investimento</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        sesi: { blue: '#0055A4', dark: '#002855', light: '#E6F0FA', green: '#78BE20' }
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0,0,0,0.04)',
                        'apple-hover': '0 8px 32px rgba(0,0,0,0.08)',
                        'apple-floating': '0 10px 40px rgba(0,0,0,0.12)'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #F8FAFC; color: #0F172A; -webkit-font-smoothing: antialiased; overflow: hidden; }
        
        /* Oculta TODAS as barras de rolagem para um visual clean */
        * { -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .slide-transition { transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1); }
        .chart-bar { transition: height 1s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Wrapper seguro para os ícones Lucide no React Virtual DOM
        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({ root: spanRef.current });
                    const svg = spanRef.current.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                    }
                }
            }, [name, size]);

            return <span ref={spanRef} className={`inline-flex items-center justify-center shrink-0 ${className}`}></span>;
        };

        const Card = ({ children, className = "", delay = "0s", bg = "bg-white" }) => (
            <div className={`${bg} rounded-[24px] p-5 md:p-6 shadow-apple hover:shadow-apple-hover transition-all duration-300 fade-in border border-slate-200/70 flex flex-col ${className}`} style={{ animationDelay: delay }}>
                {children}
            </div>
        );

        const IntroParagraph = ({ title, text, highlight }) => (
            <div className="mb-4 fade-in shrink-0">
                <h2 className="text-2xl md:text-3xl font-extrabold mb-2 text-slate-900 tracking-tight">{title}</h2>
                <p className="text-sm md:text-base text-slate-600 border-l-4 border-sesi-blue pl-4 max-w-5xl leading-relaxed">
                    {highlight && <strong className="text-sesi-dark font-bold mr-1">{highlight}</strong>}
                    {text}
                </p>
            </div>
        );

        const Source = ({ text }) => (
            <p className="text-[10px] text-slate-400 mt-4 uppercase tracking-wider font-bold shrink-0">FONTE: {text}</p>
        );

        // --- SLIDES --- //

        const Hero = () => (
            <div className="flex flex-col items-center justify-center h-full max-w-6xl mx-auto text-center fade-in relative">
                
                <div className="w-full h-48 md:h-64 mb-6 md:mb-8 rounded-[32px] overflow-hidden shadow-apple-floating relative group shrink-0">
                    <img src="https://i.postimg.cc/zXTsp2x1/Chat-GPT-Image-15-de-jul-de-2026-08-42-18-(1).png" alt="Fachada SESI Jardins" className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" />
                </div>
                
                <div className="mb-4 md:mb-6 shrink-0 flex justify-center">
                    <img src="https://i.postimg.cc/gk2Wwrbm/LOGO-SESI-JARDINS.png" alt="Logo SESI Jardins" className="h-16 md:h-24 object-contain drop-shadow-sm" />
                </div>
                
                <h1 className="text-3xl lg:text-5xl font-black tracking-tight text-slate-900 mb-8 md:mb-10 leading-tight shrink-0">
                    A educação do amanhã, <span className="text-transparent bg-clip-text bg-gradient-to-r from-sesi-blue to-cyan-500">construída hoje.</span>
                </h1>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-4xl mx-auto shrink-0 mt-auto">
                    <Card bg="bg-white" className="flex flex-col items-center justify-center py-5 md:py-6">
                        <Icon name="coins" size={28} className="text-sesi-blue mb-2" />
                        <p className="text-2xl font-black text-slate-800">R$ 149,5 mi</p>
                        <p className="text-[10px] font-bold uppercase text-slate-400 mt-1">Investimento Total</p>
                    </Card>
                    <Card bg="bg-white" className="flex flex-col items-center justify-center py-5 md:py-6">
                        <Icon name="users" size={28} className="text-emerald-500 mb-2" />
                        <p className="text-2xl font-black text-slate-800">1.500</p>
                        <p className="text-[10px] font-bold uppercase text-slate-400 mt-1">Capacidade Operacional</p>
                    </Card>
                    <Card bg="bg-white" className="flex flex-col items-center justify-center py-5 md:py-6">
                        <Icon name="maximize" size={28} className="text-amber-500 mb-2" />
                        <p className="text-2xl font-black text-slate-800">29.585 m²</p>
                        <p className="text-[10px] font-bold uppercase text-slate-400 mt-1">Área Total Geral</p>
                    </Card>
                </div>
            </div>
        );

        const MarketAnalysis = () => {
            const [activeTab, setActiveTab] = useState('demography');

            const bubbleData = [
                { id: 'bilingue', label: 'Bilíngues Puras', color: 'bg-slate-300', text: 'text-slate-800', x: 85, y: 85, size: 50, price: 'R$ 2.850 a R$ 3.284', schools: 'Maple Bear: R$ 3.284\nWinsford: R$ 3.125\nInterschool: R$ 2.850' },
                { id: 'premium', label: 'Premium Sul / Tradicional', color: 'bg-sesi-dark', text: 'text-white', x: 80, y: 30, size: 60, price: 'R$ 2.205 a R$ 4.015', schools: 'Arena: R$ 3.032 a R$ 4.015\nWR: R$ 2.850\nPeq. Príncipe: R$ 2.571 a R$ 2.835\nEthos: R$ 2.630\nMarista: R$ 2.205 a R$ 2.810' },
                { id: 'bairro', label: 'Tradicionais Locais / Bairro', color: 'bg-slate-400', text: 'text-white', x: 25, y: 25, size: 65, price: 'R$ 1.194 a R$ 2.237', schools: 'Princípios: R$ 1.973 a R$ 2.237\nFractal: R$ 1.458 a R$ 1.868\nExpovest: R$ 1.194' },
                { id: 'sesi', label: 'Oceano Azul: SESI Jardins', color: 'bg-emerald-500', text: 'text-white', x: 35, y: 80, size: 80, price: 'EF1 e EF2: R$ 1.950 | EM: R$ 3.250', schools: 'Escola SESI Jardins\n(Alta Infraestrutura + Preço Acessível)' },
            ];

            return (
                <div className="slide-content flex flex-col h-full">
                    <IntroParagraph 
                        title="Mercado, Lacuna & Insights Qualitativos" 
                        highlight="A tempestade perfeita."
                        text="A Região Leste de Goiânia combina uma base populacional consolidada e expansão imobiliária acelerada. Nossa pesquisa qualitativa confirma: há demanda reprimida por infraestrutura de ponta aliada a um preço competitivo."
                    />

                    <div className="flex flex-wrap gap-2 mb-6 shrink-0 bg-slate-100/70 p-1.5 rounded-2xl w-fit overflow-x-auto no-scrollbar max-w-full">
                        <button onClick={() => setActiveTab('demography')} className={`whitespace-nowrap px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === 'demography' ? 'bg-white shadow text-slate-900 border border-slate-200/50' : 'text-slate-500 hover:text-slate-800'}`}>Demografia</button>
                        <button onClick={() => setActiveTab('realestate')} className={`whitespace-nowrap px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === 'realestate' ? 'bg-white shadow text-slate-900 border border-slate-200/50' : 'text-slate-500 hover:text-slate-800'}`}>População & Escolas</button>
                        <button onClick={() => setActiveTab('qualitative')} className={`whitespace-nowrap px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'qualitative' ? 'bg-white shadow text-slate-900 border border-slate-200/50' : 'text-slate-500 hover:text-slate-800'}`}><Icon name="search" size={16}/> Qualitativa</button>
                        <button onClick={() => setActiveTab('positioning')} className={`whitespace-nowrap px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'positioning' ? 'bg-sesi-dark shadow text-white border border-sesi-dark' : 'text-slate-500 hover:text-slate-800'}`}><Icon name="pie-chart" size={16}/> Posicionamento & Preço</button>
                    </div>

                    <div className="flex-grow min-h-0 relative" key={activeTab}>
                        {activeTab === 'demography' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full fade-in">
                                <Card delay="0.1s" bg="bg-[#1B2A4A]" className="lg:col-span-5 flex flex-col justify-center text-white border-none p-8 md:p-10">
                                    <h3 className="text-xs font-bold text-blue-200/80 uppercase tracking-widest mb-10">Público-Alvo Estimado (Leste)</h3>
                                    <div className="space-y-10">
                                        <div>
                                            <p className="text-sm text-blue-200/90 font-bold mb-2">População Total da Região</p>
                                            <p className="text-5xl lg:text-6xl font-black tracking-tight">235.000</p>
                                        </div>
                                        <div>
                                            <p className="text-sm text-blue-200/90 font-bold mb-2">Idade Escolar (4 a 17 anos)</p>
                                            <p className="text-5xl lg:text-6xl font-black tracking-tight text-emerald-400">38.000</p>
                                        </div>
                                        <div className="pt-8 border-t border-white/10 mt-auto">
                                            <p className="text-[10px] text-blue-200/80 uppercase tracking-widest mb-2">Meta de Captação (Maturidade)</p>
                                            <p className="text-3xl font-black tracking-tight">1.500 Matrículas</p>
                                        </div>
                                    </div>
                                </Card>
                                <Card delay="0.2s" className="lg:col-span-7 flex flex-col justify-start border border-slate-200 p-8 md:p-10 overflow-y-auto">
                                    <h3 className="text-2xl font-bold text-slate-800 mb-6 shrink-0">A Dinâmica do Mercado Local</h3>
                                    <p className="text-base text-slate-600 mb-10 leading-relaxed shrink-0">
                                        A região abriga desde o Leste Tradicional (adensado) até o Eixo Premium (Alphaville/GO-020). A grande oportunidade reside na <strong>ausência de escolas privadas de ciclo completo com padrão de excelência</strong> nesse corredor.
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 shrink-0">
                                        <div className="bg-blue-50/50 p-6 rounded-2xl border border-blue-50">
                                            <Icon name="map-pin" className="text-sesi-blue mb-4" size={24} />
                                            <p className="text-sm font-bold text-slate-800 mb-2">Localização Estratégica</p>
                                            <p className="text-xs text-slate-500 leading-relaxed">Interseção entre o Leste Tradicional e os Condomínios de Alta Renda.</p>
                                        </div>
                                        <div className="bg-emerald-50/50 p-6 rounded-2xl border border-emerald-50">
                                            <Icon name="trending-up" className="text-emerald-600 mb-4" size={24} />
                                            <p className="text-sm font-bold text-slate-800 mb-2">Crescimento Acelerado</p>
                                            <p className="text-xs text-slate-500 leading-relaxed">Expansão residencial contínua com forte atração de famílias jovens.</p>
                                        </div>
                                        <div className="bg-amber-50/30 p-6 rounded-2xl border border-amber-50">
                                            <Icon name="target" className="text-amber-600 mb-4" size={24} />
                                            <p className="text-sm font-bold text-slate-800 mb-2">Demanda Reprimida</p>
                                            <p className="text-xs text-slate-500 leading-relaxed">Forte propensão a migrar para um modelo Premium Acessível.</p>
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        )}
                        {activeTab === 'realestate' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full fade-in">
                                
                                {/* Coluna de Destaque / Insight */}
                                <Card delay="0.1s" className="lg:col-span-4 flex flex-col justify-start border-l-[6px] border-l-emerald-500 bg-emerald-50/40 overflow-y-auto">
                                    <div className="w-12 h-12 rounded-xl bg-emerald-100 flex items-center justify-center mb-6 text-emerald-600 shrink-0">
                                        <Icon name="lightbulb" size={24} />
                                    </div>
                                    <h3 className="text-xl font-black text-slate-800 mb-3 leading-tight shrink-0">
                                        A Grande Lacuna da Região Leste
                                    </h3>
                                    <p className="text-sm text-slate-600 mb-6 leading-relaxed shrink-0">
                                        Ao cruzar a base populacional com a oferta privada existente, a discrepância evidencia um <strong className="text-emerald-700">Oceano Azul</strong> de demanda reprimida:
                                    </p>
                                    
                                    <div className="bg-white p-4 rounded-xl border border-emerald-100 shadow-sm mb-3 shrink-0">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Pop. Idade Escolar (Leste)</p>
                                        <p className="text-3xl font-black text-slate-800 tracking-tight">37.806</p>
                                    </div>
                                    
                                    <div className="bg-white p-4 rounded-xl border border-emerald-100 shadow-sm mb-6 shrink-0">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Matrículas Privadas (Leste)</p>
                                        <p className="text-3xl font-black text-emerald-600 tracking-tight">9.004</p>
                                    </div>

                                    <div className="mt-auto pt-5 border-t border-emerald-200/60 shrink-0">
                                        <p className="text-xs text-slate-600 font-medium leading-relaxed">
                                            Apenas <span className="font-black text-emerald-700 text-lg bg-emerald-100/80 px-1.5 py-0.5 rounded shadow-sm">24%</span> de taxa de cobertura. Este é o vetor com maior margem de expansão educacional de Goiânia.
                                        </p>
                                    </div>
                                </Card>

                                {/* Coluna do Mapa (Maximizada) */}
                                <Card delay="0.2s" className="lg:col-span-8 flex flex-col justify-center items-center p-2 bg-slate-50 border-2 border-slate-200 overflow-hidden relative group">
                                    <div className="absolute top-4 left-4 z-10 bg-white/80 backdrop-blur px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                            <Icon name="map" size={14} className="text-sesi-blue" />
                                            Mapa de Cobertura
                                        </p>
                                    </div>
                                    <img src="https://i.postimg.cc/zvw9LZ0Y/pop-leste.png" alt="Mapa de Matrículas e Escolas" className="w-full h-full object-contain p-2 md:p-6 transition-transform duration-700 group-hover:scale-[1.02]" />
                                </Card>
                            </div>
                        )}
                        {activeTab === 'qualitative' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full fade-in overflow-y-auto pb-4">
                                <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <Card delay="0.1s" className="flex flex-col justify-start border-l-[6px] border-l-sesi-blue p-6 md:p-8">
                                        <div>
                                            <div className="flex items-center gap-3 mb-4 shrink-0">
                                                <div className="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-sesi-blue border border-blue-100"><Icon name="building" size={20}/></div>
                                                <h4 className="font-bold text-slate-800 text-lg">Força da Infraestrutura</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">
                                                A infraestrutura verde e ampla foi vista como um diferencial escasso em Goiânia, gerando alto impacto positivo.
                                            </p>
                                        </div>
                                    </Card>

                                    <Card delay="0.2s" className="flex flex-col justify-start border-l-[6px] border-l-emerald-500 p-6 md:p-8">
                                        <div>
                                            <div className="flex items-center gap-3 mb-4 shrink-0">
                                                <div className="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 border border-emerald-100"><Icon name="dollar-sign" size={20}/></div>
                                                <h4 className="font-bold text-slate-800 text-lg">Preço Competitivo</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">
                                                A mensalidade proposta foi considerada atrativa e abaixo do que muitos já pagam, gerando predisposição à migração.
                                            </p>
                                        </div>
                                    </Card>
                                    
                                    <Card delay="0.3s" className="flex flex-col justify-start border-l-[6px] border-l-amber-400 p-6 md:p-8">
                                        <div>
                                            <div className="flex items-center gap-3 mb-4 shrink-0">
                                                <div className="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center text-amber-600 border border-amber-100"><Icon name="brain" size={20}/></div>
                                                <h4 className="font-bold text-slate-800 text-lg">Metodologia vs. Tradição</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">
                                                Enquanto muitos buscam inovação, ainda há forte apego ao modelo tradicional focado em vestibulares e Enem.
                                            </p>
                                        </div>
                                    </Card>

                                    <Card delay="0.4s" className="flex flex-col justify-start border-l-[6px] border-l-purple-500 p-6 md:p-8">
                                        <div>
                                            <div className="flex items-center gap-3 mb-4 shrink-0">
                                                <div className="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-purple-600 border border-purple-100"><Icon name="map-pin" size={20}/></div>
                                                <h4 className="font-bold text-slate-800 text-lg">Logística e Localização</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 leading-relaxed">
                                                A localização na região dos Jardins é um trunfo gigante para quem já mora lá e quer fugir do trânsito.
                                            </p>
                                        </div>
                                    </Card>
                                </div>
                                
                                <Card delay="0.5s" bg="bg-sesi-dark" className="lg:col-span-4 flex flex-col justify-center text-white border-none relative overflow-hidden p-6 md:p-8">
                                    <Icon name="shield-check" size={120} className="absolute -right-6 -bottom-6 text-white opacity-5" />
                                    <h3 className="text-xl font-bold mb-4 relative z-10">O Papel da Marca SESI</h3>
                                    <p className="text-sm text-blue-100 mb-6 leading-relaxed relative z-10">
                                        A marca traz credibilidade e associação com tecnologia/robótica. O desafio é mostrar que atende ao perfil de alta renda (Jardins), mantendo a acessibilidade.
                                    </p>
                                </Card>
                            </div>
                        )}
                        {activeTab === 'positioning' && (
                            <div className="flex flex-col h-full fade-in">
                                <Card className="flex-grow flex flex-col p-6 relative bg-slate-50 overflow-hidden border-2 border-slate-200">
                                    <h3 className="text-xl font-bold text-slate-800 mb-2">Mapeamento de Concorrência & Oceano Azul</h3>
                                    <p className="text-sm text-slate-500 mb-6">Cruzamento entre ticket médio (mensalidade) e proposta de valor (inovação vs. tradição).</p>
                                    
                                    <div className="relative flex-grow border-l-2 border-b-2 border-slate-300 ml-8 mb-8 mt-4 bg-white rounded-tr-xl">
                                        {/* Eixos */}
                                        <div className="absolute -left-8 top-1/2 -translate-y-1/2 -rotate-90 text-[10px] font-bold text-slate-400 uppercase tracking-widest whitespace-nowrap">Inovação / Infraestrutura</div>
                                        <div className="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-400 uppercase tracking-widest whitespace-nowrap">Preço / Mensalidade</div>
                                        
                                        <div className="absolute -bottom-6 left-0 text-[10px] text-slate-400 font-bold">Acessível</div>
                                        <div className="absolute -bottom-6 right-0 text-[10px] text-slate-400 font-bold">Alto (Premium)</div>
                                        <div className="absolute bottom-0 -left-6 text-[10px] text-slate-400 font-bold">Padrão</div>
                                        <div className="absolute top-0 -left-6 text-[10px] text-slate-400 font-bold">Alta</div>

                                        <div className="absolute left-1/2 top-0 bottom-0 w-px bg-slate-200 border-dashed border-l"></div>
                                        <div className="absolute top-1/2 left-0 right-0 h-px bg-slate-200 border-dashed border-t"></div>

                                        {/* Bolhas */}
                                        {bubbleData.map((bubble, i) => (
                                            <div key={i} className="absolute group" style={{ left: `${bubble.x}%`, bottom: `${bubble.y}%`, transform: 'translate(-50%, 50%)' }}>
                                                <div className={`flex items-center justify-center rounded-full ${bubble.color} shadow-lg cursor-pointer transition-transform duration-300 group-hover:scale-110 flex-col text-center p-2 z-10 relative`} style={{ width: `${bubble.size}px`, height: `${bubble.size}px` }}>
                                                </div>
                                                
                                                {/* Permanent Label below the bubble */}
                                                <div className="absolute top-[calc(100%+8px)] left-1/2 -translate-x-1/2 whitespace-nowrap text-center pointer-events-none z-0">
                                                    <p className={`text-[10px] font-bold uppercase leading-tight ${bubble.color.replace('bg-', 'text-')}`}>{bubble.label}</p>
                                                    <p className="text-[10px] font-semibold text-slate-500">{bubble.price}</p>
                                                </div>

                                                {/* Tooltip Card on Hover */}
                                                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-48 md:w-64 bg-white border border-slate-200 p-3 rounded-xl shadow-2xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-20">
                                                    <p className={`text-[10px] font-black uppercase mb-1 ${bubble.color.replace('bg-', 'text-')}`}>{bubble.label}</p>
                                                    <p className="text-xs font-bold text-slate-800 mb-1">{bubble.price}</p>
                                                    <p className="text-[10px] text-slate-500 leading-tight whitespace-pre-wrap">{bubble.schools}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            </div>
                        )}
                    </div>
