<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A educação do amanhã, construída hoje - SESI Jardins</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        sesi: { blue: '#0055A4', dark: '#002855', light: '#E6F0FA' }
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0,0,0,0.04)',
                        'apple-hover': '0 8px 32px rgba(0,0,0,0.08)',
                        'apple-floating': '0 10px 40px rgba(0,0,0,0.12)'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #F1F5F9; color: #0F172A; -webkit-font-smoothing: antialiased; overflow: hidden; }
        .slide-content::-webkit-scrollbar { width: 6px; }
        .slide-content::-webkit-scrollbar-track { background: transparent; }
        .slide-content::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.2); border-radius: 10px; }
        .slide-content::-webkit-scrollbar-thumb:hover { background: rgba(15, 23, 42, 0.4); }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .slide-transition { transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: currentColor; cursor: pointer; margin-top: -6px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #E2E8F0; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Wrapper seguro para o Lucide Icons não quebrar a árvore do React Virtual DOM
        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({ root: spanRef.current });
                    const svg = spanRef.current.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                    }
                }
            }, [name, size]);

            return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const Card = ({ children, className = "", delay = "0s", bg = "bg-white" }) => (
            <div className={`${bg} rounded-3xl p-6 shadow-apple hover:shadow-apple-hover transition-all duration-300 fade-in border border-slate-200/60 ${className}`} style={{ animationDelay: delay }}>
                {children}
            </div>
        );

        const IntroParagraph = ({ title, text, highlight }) => (
            <div className="mb-6 fade-in shrink-0">
                <h2 className="text-3xl md:text-4xl font-extrabold mb-3 text-slate-900 tracking-tight">{title}</h2>
                <p className="text-base md:text-lg text-slate-600 border-l-4 border-sesi-blue pl-4 max-w-5xl leading-relaxed">
                    {highlight && <strong className="text-sesi-dark font-bold mr-1">{highlight}</strong>}
                    {text}
                </p>
            </div>
        );

        const Source = ({ text }) => (
            <p className="text-[10px] text-slate-400 mt-4 uppercase tracking-wider font-bold shrink-0">FONTE: {text}</p>
        );

        const Hero = () => (
            <div className="flex flex-col items-center justify-center h-full max-w-6xl mx-auto text-center fade-in">
                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-50 border border-blue-100 text-sm font-bold text-sesi-blue mb-8 shadow-sm">
                    <Icon name="file-text" size={16} />
                    PRO-02812/2025 • Projeto Executivo
                </div>
                
                <h1 className="text-5xl lg:text-7xl font-black tracking-tight text-slate-900 mb-6 leading-tight">
                    A educação do amanhã, <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-sesi-blue to-cyan-500">construída hoje.</span>
                </h1>
                
                <p className="text-xl text-slate-600 max-w-3xl mx-auto font-medium leading-relaxed mb-10">
                    Estudo de viabilidade e estruturação técnica para a implantação da Escola SESI Jardins. Um complexo educacional de excelência atendendo à demanda reprimida da Região Leste de Goiânia.
                </p>

                <div className="w-full max-w-4xl mx-auto rounded-[2rem] overflow-hidden shadow-apple-floating relative bg-slate-100 aspect-[21/9] border border-slate-200 group">
                    <img src="https://i.postimg.cc/zXTsp2x1/Chat-GPT-Image-15-de-jul-de-2026-08-42-18-(1).png" alt="Fachada SESI Jardins" className="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent"></div>
                    <div className="absolute bottom-6 left-6 text-white text-left">
                        <p className="text-sm font-bold uppercase tracking-wider opacity-80 mb-1">Capacidade Operacional</p>
                        <p className="text-3xl font-black">1.500 Estudantes</p>
                    </div>
                </div>
            </div>
        );

        const MarketAnalysis = () => {
            const [activeTab, setActiveTab] = useState('demography');

            return (
                <div className="slide-content flex flex-col h-full">
                    <IntroParagraph 
                        title="Mercado, Lacuna & Insights Qualitativos" 
                        highlight="A tempestade perfeita."
                        text="A Região Leste de Goiânia combina uma base populacional consolidada e expansão imobiliária acelerada. A oferta de educação privada premium, no entanto, ainda se concentra no eixo Sul/Marista. Nossa pesquisa qualitativa confirma: há demanda reprimida por infraestrutura de ponta aliada a um preço competitivo."
                    />

                    <div className="flex flex-wrap gap-2 mb-6 shrink-0 bg-slate-100 p-1 rounded-xl w-fit">
                        <button onClick={() => setActiveTab('demography')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'demography' ? 'bg-white shadow-sm text-sesi-dark' : 'text-slate-500 hover:text-slate-800'}`}>Demografia & Lacuna</button>
                        <button onClick={() => setActiveTab('realestate')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'realestate' ? 'bg-white shadow-sm text-sesi-dark' : 'text-slate-500 hover:text-slate-800'}`}>Economia & Imobiliário</button>
                        <button onClick={() => setActiveTab('qualitative')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-1.5 ${activeTab === 'qualitative' ? 'bg-white shadow-sm text-sesi-dark' : 'text-slate-500 hover:text-slate-800'}`}><Icon name="search" size={16}/> Pesquisa (Checon)</button>
                    </div>

                    <div className="flex-grow min-h-0 relative" key={activeTab}>
                        {activeTab === 'demography' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full fade-in">
                                <Card delay="0.1s" bg="bg-sesi-dark" className="lg:col-span-4 flex flex-col justify-center text-white border-none">
                                    <h3 className="text-sm font-bold text-blue-200 uppercase tracking-wider mb-6">Público-Alvo Estimado (Leste)</h3>
                                    <div className="space-y-6">
                                        <div>
                                            <p className="text-xs text-blue-300 font-semibold mb-1">População Total da Região</p>
                                            <p className="text-4xl font-black">205 a 235k</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-blue-300 font-semibold mb-1">Idade Escolar (4 a 17 anos)</p>
                                            <p className="text-4xl font-black text-emerald-400">32 a 38k</p>
                                        </div>
                                        <div className="pt-4 border-t border-white/10">
                                            <p className="text-[10px] text-blue-200 uppercase tracking-wider mb-1">Meta de Captação (Maturidade)</p>
                                            <p className="text-2xl font-bold">1.500 Matrículas</p>
                                        </div>
                                    </div>
                                </Card>
                                <Card delay="0.2s" className="lg:col-span-8 flex flex-col justify-center border-2 border-slate-100">
                                    <h3 className="text-xl font-bold text-slate-800 mb-4">A Dinâmica do Mercado Local</h3>
                                    <p className="text-sm text-slate-600 mb-6 leading-relaxed">
                                        A região abriga desde o Leste Tradicional (adensado) até o Eixo Premium (Alphaville/GO-020). A grande oportunidade reside na <strong>ausência de escolas privadas de ciclo completo com padrão de excelência</strong> nesse corredor, forçando o deslocamento diário das famílias para a zona Sul.
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                            <Icon name="map-pin" className="text-sesi-blue mb-2" size={20} />
                                            <p className="text-sm font-bold text-slate-800">Localização Estratégica</p>
                                            <p className="text-xs text-slate-600 mt-1">Interseção entre o Leste Tradicional e os Condomínios de Alta Renda.</p>
                                        </div>
                                        <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                                            <Icon name="trending-up" className="text-emerald-600 mb-2" size={20} />
                                            <p className="text-sm font-bold text-slate-800">Crescimento Acelerado</p>
                                            <p className="text-xs text-slate-600 mt-1">Expansão residencial contínua com forte atração de famílias jovens.</p>
                                        </div>
                                        <div className="bg-amber-50 p-4 rounded-xl border border-amber-100">
                                            <Icon name="target" className="text-amber-600 mb-2" size={20} />
                                            <p className="text-sm font-bold text-slate-800">Demanda Reprimida</p>
                                            <p className="text-xs text-slate-600 mt-1">Forte propensão a migrar para um modelo Premium Acessível.</p>
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        )}
                        {activeTab === 'realestate' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 h-full fade-in">
                                <Card delay="0.1s" className="flex flex-col justify-center border-l-4 border-l-sesi-blue">
                                    <div className="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center mb-6 text-sesi-blue">
                                        <Icon name="briefcase" size={24} />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-2">Geração de Emprego Formal</h3>
                                    <p className="text-slate-600 text-sm mb-6">Goiânia lidera o saldo de empregos formais no estado, sustentando a capacidade de pagamento das famílias para educação privada.</p>
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Saldo Goiânia (2025)</p>
                                        <p className="text-3xl font-black text-slate-800">+14.138 <span className="text-lg text-slate-500 font-semibold">novas vagas</span></p>
                                        <p className="text-xs text-slate-500 mt-2">Estoque total: 568.900 vínculos (Novo Caged).</p>
                                    </div>
                                </Card>
                                <Card delay="0.2s" className="flex flex-col justify-center border-l-4 border-l-emerald-500">
                                    <div className="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center mb-6 text-emerald-600">
                                        <Icon name="home" size={24} />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-2">Boom Imobiliário (Residencial)</h3>
                                    <p className="text-slate-600 text-sm mb-6">A expansão dos condomínios horizontais ao longo da GO-020 e Alphaville ancora o público-alvo de alto poder aquisitivo no vetor Leste.</p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Vendas 2024</p>
                                            <p className="text-2xl font-black text-emerald-700">R$ 7,7 Bi</p>
                                            <span className="text-xs font-bold text-emerald-600 bg-emerald-100 px-1.5 py-0.5 rounded mt-1 inline-block">+35% a.a.</span>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">1º Sem. 2025</p>
                                            <p className="text-2xl font-black text-emerald-700">R$ 4,1 Bi</p>
                                            <span className="text-xs font-bold text-emerald-600 bg-emerald-100 px-1.5 py-0.5 rounded mt-1 inline-block">+21% a.a.</span>
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        )}
                        {activeTab === 'qualitative' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full fade-in overflow-y-auto pb-4">
                                <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <Card delay="0.1s" className="flex flex-col justify-between border-t-4 border-t-sesi-blue">
                                        <div>
                                            <div className="flex items-center gap-2 mb-3">
                                                <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-sesi-blue"><Icon name="building" size={16}/></div>
                                                <h4 className="font-bold text-slate-800">Força da Infraestrutura</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 mb-4 leading-relaxed">
                                                O filme da nova escola causou forte impacto positivo. A infraestrutura verde e ampla foi vista como um diferencial escasso em Goiânia.
                                            </p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 text-xs italic text-slate-500">
                                            "Adorei a proposta. A educação aí o foco é no futuro... Goiânia não tem nada nesse estilo." — Pai (Pesquisa Qualitativa)
                                        </div>
                                    </Card>

                                    <Card delay="0.2s" className="flex flex-col justify-between border-t-4 border-t-emerald-500">
                                        <div>
                                            <div className="flex items-center gap-2 mb-3">
                                                <div className="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600"><Icon name="dollar-sign" size={16}/></div>
                                                <h4 className="font-bold text-slate-800">Preço Competitivo</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 mb-4 leading-relaxed">
                                                A mensalidade proposta (na faixa de R$ 2.000 a R$ 2.500) foi considerada atrativa e abaixo do que muitos já pagam, gerando alta predisposição à migração.
                                            </p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 text-xs italic text-slate-500">
                                            "Até quanto pagaria? Ah, até 2.500." — Pai (Pesquisa Qualitativa)
                                        </div>
                                    </Card>

                                    <Card delay="0.3s" className="flex flex-col justify-between border-t-4 border-t-amber-500">
                                        <div>
                                            <div className="flex items-center gap-2 mb-3">
                                                <div className="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-amber-600"><Icon name="brain" size={16}/></div>
                                                <h4 className="font-bold text-slate-800">Metodologia vs. Tradição</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 mb-4 leading-relaxed">
                                                Há um embate. Enquanto muitos buscam inovação (Empreendedorismo, Liderança), ainda há forte apego ao modelo tradicional focado em vestibulares.
                                            </p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 text-xs italic text-slate-500">
                                            "É preciso vender para além de simulados, mas a aprovação tradicional ainda pesa na decisão." — Especialista
                                        </div>
                                    </Card>

                                    <Card delay="0.4s" className="flex flex-col justify-between border-t-4 border-t-purple-500">
                                        <div>
                                            <div className="flex items-center gap-2 mb-3">
                                                <div className="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-purple-600"><Icon name="map-pin" size={16}/></div>
                                                <h4 className="font-bold text-slate-800">Logística e Localização</h4>
                                            </div>
                                            <p className="text-sm text-slate-600 mb-4 leading-relaxed">
                                                A localização na região dos Jardins é vista como um trunfo gigante para quem já mora lá e quer fugir do trânsito rumo ao centro/sul.
                                            </p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 text-xs italic text-slate-500">
                                            "A comodidade vai atrair um público que já mora próximo. É fugir do trânsito." — Professor
                                        </div>
                                    </Card>
                                </div>

                                <Card delay="0.5s" bg="bg-sesi-dark" className="lg:col-span-4 flex flex-col justify-center text-white border-none relative overflow-hidden">
                                    <Icon name="shield-check" size={120} className="absolute -right-6 -bottom-6 text-white opacity-5" />
                                    <h3 className="text-xl font-bold mb-4 relative z-10">O Papel da Marca SESI</h3>
                                    <p className="text-sm text-blue-100 mb-6 leading-relaxed relative z-10">
                                        A pesquisa revela que a marca SESI traz **credibilidade e associação positiva com tecnologia e robótica**. O desafio de comunicação será reposicionar a percepção, mostrando que a nova escola atende com excelência o perfil de alta renda (Jardins), mantendo a acessibilidade e o papel social.
                                    </p>
                                    <div className="bg-white/10 p-4 rounded-xl backdrop-blur-sm border border-white/10 relative z-10">
                                        <p className="text-[10px] uppercase font-bold text-emerald-300 mb-1">Dica Estratégica</p>
                                        <p className="text-sm font-medium">Focar a campanha de migração nos anos iniciais (Fundamental I), onde os pais estão mais abertos a novas propostas, e aliar o discurso de inovação (STEAM) à segurança de resultados concretos.</p>
                                    </div>
                                </Card>
                            </div>
                        )}
                    </div>
                    <Source text={activeTab === 'qualitative' ? "Pesquisa Qualitativa: Viabilidade Escola Jardins (Checon Pesquisa, Junho/2025)." : "Estudo de Viabilidade 2026. IBGE, Censo Escolar 2025, Novo Caged, ADEMI-GO."} />
                </div>
            );
        };

        const PricingBenchmark = () => (
            <div className="slide-content flex flex-col h-full">
                <IntroParagraph 
                    title="Pricing & Posicionamento" 
                    text="A estratégia não é competir pelo menor preço no Leste Tradicional, nem replicar os tickets extremos das escolas bilíngues de luxo. O modelo SESI oferece integralidade opcional, estrutura de ponta e robótica com valores equivalentes às escolas de 'médio padrão' da Região Sul."
                    highlight="Premium Acessível."
                />

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow min-h-0">
                    <Card delay="0.1s" className="lg:col-span-8 flex flex-col relative overflow-hidden">
                        <h3 className="text-lg font-bold mb-2 text-slate-800 shrink-0">Benchmark de Mensalidades (Goiânia - 2026)</h3>
                        <p className="text-sm text-slate-500 mb-4 shrink-0">Pesquisa de preços cheios no mercado (sem descontos).</p>
                        
                        <div className="flex flex-wrap gap-4 mb-4 justify-center text-sm font-bold shrink-0">
                            <span className="flex items-center gap-2 text-slate-600"><div className="w-4 h-4 bg-slate-200 rounded-md"></div> Leste/Centro-Oeste</span>
                            <span className="flex items-center gap-2 text-slate-600"><div className="w-4 h-4 bg-slate-400 rounded-md"></div> Premium (Sul)</span>
                            <span className="flex items-center gap-2 text-slate-600"><div className="w-4 h-4 bg-emerald-600 rounded-md"></div> Bilíngues Puras</span>
                        </div>

                        {/* Chart Area */}
                        <div className="relative flex-grow flex flex-col min-h-[250px] pt-12 pb-6 mt-4 border-b border-slate-100">
                            
                            {/* Linhas Alvo SESI */}
                            <div className="absolute w-full border-t-[3px] border-dotted border-sesi-blue z-0 left-0" style={{ bottom: `calc(${(2850/5500)*100}% + 24px)` }}>
                                <span className="absolute -top-7 right-0 lg:right-4 text-[10px] lg:text-xs font-black text-white bg-sesi-blue px-2 py-1 rounded-full shadow-md z-30">Alvo SESI (EF): R$ 2.850</span>
                            </div>
                            <div className="absolute w-full border-t-[3px] border-dotted border-sesi-dark z-0 left-0" style={{ bottom: `calc(${(3350/5500)*100}% + 24px)` }}>
                                <span className="absolute -top-7 right-0 lg:right-4 text-[10px] lg:text-xs font-black text-white bg-sesi-dark px-2 py-1 rounded-full shadow-md z-30">Alvo SESI (EM): R$ 3.350</span>
                            </div>

                            <div className="flex-grow flex items-end justify-around w-full z-10 gap-2 lg:gap-4 h-full relative">
                                {[
                                    { stage: 'Ed. Infantil', c1: 1407, c2: 2350, c3: 3085 },
                                    { stage: 'Fund. I', c1: 1490, c2: 2427, c3: 3030 },
                                    { stage: 'Fund. II', c1: 1671, c2: 2609, c3: 3332 },
                                    { stage: 'Ensino Médio', c1: 2158, c2: 3241, c3: 5236 }
                                ].map((item, idx) => (
                                    <div key={idx} className="flex flex-col items-center justify-end h-full w-1/4 group">
                                        <div className="flex items-end justify-center w-full gap-1 lg:gap-2 h-full">
                                            <div className="w-1/3 max-w-[40px] bg-slate-200 rounded-t-xl relative flex flex-col justify-start items-center transition-all duration-700" style={{ height: `${(item.c1/5500)*100}%` }}>
                                                 <span className="absolute -top-6 text-[9px] lg:text-[11px] font-black text-slate-600 bg-white/90 px-1 rounded shadow-sm border border-slate-100">{item.c1}</span>
                                            </div>
                                            <div className="w-1/3 max-w-[40px] bg-slate-400 rounded-t-xl relative flex flex-col justify-start items-center shadow-sm transition-all duration-700" style={{ height: `${(item.c2/5500)*100}%` }}>

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
