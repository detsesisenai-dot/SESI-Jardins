<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESI Jardins - A tese de investimento</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        sesi: { blue: '#0055A4', dark: '#002855', light: '#E6F0FA', green: '#78BE20' }
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0,0,0,0.04)',
                        'apple-hover': '0 8px 32px rgba(0,0,0,0.08)',
                        'apple-floating': '0 10px 40px rgba(0,0,0,0.12)'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #F8FAFC; color: #0F172A; -webkit-font-smoothing: antialiased; overflow: hidden; }
        
        /* Oculta TODAS as barras de rolagem para um visual clean */
        * { -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .slide-transition { transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1); }
        .chart-bar { transition: height 1s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Wrapper seguro para os ícones Lucide no React Virtual DOM
        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({ root: spanRef.current });
                    const svg = spanRef.current.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                    }
                }
            }, [name, size]);

            return <span ref={spanRef} className={`inline-flex items-center justify-center shrink-0 ${className}`}></span>;
        };

        const Card = ({ children, className = "", delay = "0s", bg = "bg-white" }) => (
            <div className={`${bg} rounded-[24px] p-5 md:p-6 shadow-apple hover:shadow-apple-hover transition-all duration-300 fade-in border border-slate-200/70 flex flex-col ${className}`} style={{ animationDelay: delay }}>
                {children}
            </div>
        );

        const IntroParagraph = ({ title, text, highlight }) => (
            <div className="mb-4 fade-in shrink-0">
                <h2 className="text-2xl md:text-3xl font-extrabold mb-2 text-slate-900 tracking-tight">{title}</h2>
                <p className="text-sm md:text-base text-slate-600 border-l-4 border-sesi-blue pl-4 max-w-5xl leading-relaxed">
                    {highlight && <strong className="text-sesi-dark font-bold mr-1">{highlight}</strong>}
                    {text}
                </p>
            </div>
        );

        const Source = ({ text }) => (
            <p className="text-[9px] text-slate-400 mt-3 uppercase tracking-wider font-bold shrink-0">FONTE: {text}</p>
        );

        const Hero = () => (
            <div className="flex flex-col items-center justify-center h-full max-w-6xl mx-auto text-center fade-in relative">
                <div className="w-full h-40 md:h-52 mb-6 rounded-[32px] overflow-hidden shadow-apple-floating relative group shrink-0">
                    <img src="https://i.postimg.cc/zXTsp2x1/Chat-GPT-Image-15-de-jul-de-2026-08-42-18-(1).png" alt="Fachada SESI Jardins" className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                    <div className="absolute bottom-4 left-6 text-white text-left">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/20 backdrop-blur-md border border-white/30 text-xs font-bold mb-1 shadow-sm">
                            <Icon name="bar-chart" size={14} /> PROJEÇÃO GERAL - 2026 V2
                        </div>
                    </div>
                </div>
                
                <h1 className="text-3xl lg:text-5xl font-black tracking-tight text-slate-900 mb-3 leading-tight shrink-0">
                    A educação do amanhã, <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-sesi-blue to-cyan-500">construída hoje.</span>
                </h1>
                
                <p className="text-sm md:text-base text-slate-600 max-w-3xl mx-auto font-medium leading-relaxed mb-6 shrink-0">
                    A tese de investimento da Escola SESI Jardins troca aposta por engenharia financeira: maior CAPEX, escala com controle, ramp-up conservador e margem positiva a partir do Ano 2.
                </p>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full max-w-4xl mx-auto shrink-0">
                    <Card bg="bg-white" className="items-center justify-center py-4 md:py-5">
                        <Icon name="coins" size={24} className="text-sesi-blue mb-2" />
                        <p className="text-xl md:text-2xl font-black text-slate-800">R$ 149,5 mi</p>
                        <p className="text-[9px] md:text-[10px] font-bold uppercase text-slate-400 mt-1">Investimento Total</p>
                    </Card>
                    <Card bg="bg-white" className="items-center justify-center py-4 md:py-5">
                        <Icon name="users" size={24} className="text-emerald-500 mb-2" />
                        <p className="text-xl md:text-2xl font-black text-slate-800">1.600</p>
                        <p className="text-[9px] md:text-[10px] font-bold uppercase text-slate-400 mt-1">Capacidade Plena</p>
                    </Card>
                    <Card bg="bg-white" className="items-center justify-center py-4 md:py-5">
                        <Icon name="maximize" size={24} className="text-amber-500 mb-2" />
                        <p className="text-xl md:text-2xl font-black text-slate-800">29.585 m²</p>
                        <p className="text-[9px] md:text-[10px] font-bold uppercase text-slate-400 mt-1">Área Total Geral</p>
                    </Card>
                    <Card bg="bg-white" className="items-center justify-center py-4 md:py-5">
                        <Icon name="timer" size={24} className="text-purple-500 mb-2" />
                        <p className="text-xl md:text-2xl font-black text-slate-800">10a 4m</p>
                        <p className="text-[9px] md:text-[10px] font-bold uppercase text-slate-400 mt-1">Payback Projetado</p>
                    </Card>
                </div>
            </div>
        );

        const MarketAnalysis = () => {
            const [activeTab, setActiveTab] = useState('demography');

            const bubbleData = [
                { id: 'bilingue', label: 'Bilíngues Puras', color: 'bg-slate-300', text: 'text-slate-800', x: 85, y: 85, size: 50, price: '> R$ 3.500', schools: 'Maple Bear (Escola Canadense)' },
                { id: 'premium', label: 'Premium Sul / Tradicional', color: 'bg-sesi-dark', text: 'text-white', x: 80, y: 30, size: 60, price: 'R$ 2.800 a R$ 3.500+', schools: 'Colégio Marista, Colégio WR, Colégio Arena' },
                { id: 'bairro', label: 'Tradicionais Locais / Bairro', color: 'bg-slate-400', text: 'text-white', x: 25, y: 25, size: 65, price: 'R$ 1.200 a R$ 1.900', schools: 'Colégio Expovest, Princípios, Fractal, Pequeno Príncipe' },
                { id: 'sesi', label: 'Oceano Azul: SESI Jardins', color: 'bg-emerald-500', text: 'text-white', x: 35, y: 80, size: 80, price: 'R$ 1.950 (Projetado)', schools: 'Escola SESI Jardins (Alta Infraestrutura + Preço Acessível)' },
            ];

            return (
                <div className="slide-content flex flex-col h-full">
                    <IntroParagraph 
                        title="Mercado, Lacuna & Insights Qualitativos" 
                        highlight="A tempestade perfeita."
                        text="A Região Leste de Goiânia combina uma base populacional consolidada e expansão imobiliária acelerada. Nossa pesquisa qualitativa confirma: há demanda reprimida por infraestrutura de ponta aliada a um preço competitivo."
                    />

                    <div className="flex flex-wrap gap-2 mb-4 shrink-0 bg-slate-100/70 p-1.5 rounded-xl w-fit overflow-x-hidden max-w-full">
                        <button onClick={() => setActiveTab('demography')} className={`whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'demography' ? 'bg-white shadow text-slate-900 border border-slate-200/50' : 'text-slate-500 hover:text-slate-800'}`}>Demografia</button>
                        <button onClick={() => setActiveTab('realestate')} className={`whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'realestate' ? 'bg-white shadow text-slate-900 border border-slate-200/50' : 'text-slate-500 hover:text-slate-800'}`}>Imobiliário</button>
                        <button onClick={() => setActiveTab('qualitative')} className={`whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${activeTab === 'qualitative' ? 'bg-white shadow text-slate-900 border border-slate-200/50' : 'text-slate-500 hover:text-slate-800'}`}><Icon name="search" size={14}/> Qualitativa</button>
                        <button onClick={() => setActiveTab('positioning')} className={`whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${activeTab === 'positioning' ? 'bg-sesi-dark shadow text-white border border-sesi-dark' : 'text-slate-500 hover:text-slate-800'}`}><Icon name="pie-chart" size={14}/> Posicionamento & Preço</button>
                    </div>

                    <div className="flex-grow min-h-0 relative flex flex-col" key={activeTab}>
                        {activeTab === 'demography' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 h-full fade-in flex-grow">
                                <Card delay="0.1s" bg="bg-[#1B2A4A]" className="lg:col-span-5 justify-center text-white border-none p-6">
                                    <h3 className="text-xs font-bold text-blue-200/80 uppercase tracking-widest mb-6">Público-Alvo Estimado (Leste)</h3>
                                    <div className="space-y-6 flex-grow flex flex-col justify-center">
                                        <div>
                                            <p className="text-xs text-blue-200/90 font-bold mb-1">População Total da Região</p>
                                            <p className="text-4xl lg:text-5xl font-black tracking-tight">205 a 235k</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-blue-200/90 font-bold mb-1">Idade Escolar (4 a 17 anos)</p>
                                            <p className="text-4xl lg:text-5xl font-black tracking-tight text-emerald-400">32 a 38k</p>
                                        </div>
                                    </div>
                                    <div className="pt-4 border-t border-white/10 mt-auto shrink-0">
                                        <p className="text-[9px] text-blue-200/80 uppercase tracking-widest mb-1">Meta de Captação (Maturidade)</p>
                                        <p className="text-2xl font-black tracking-tight">1.500 Matrículas</p>
                                    </div>
                                </Card>
                                <Card delay="0.2s" className="lg:col-span-7 justify-start border border-slate-200 p-6">
                                    <h3 className="text-xl font-bold text-slate-800 mb-3 shrink-0">A Dinâmica do Mercado Local</h3>
                                    <p className="text-sm text-slate-600 mb-6 leading-relaxed shrink-0">
                                        A região abriga desde o Leste Tradicional (adensado) até o Eixo Premium (Alphaville/GO-020). A grande oportunidade reside na <strong>ausência de escolas privadas de ciclo completo com padrão de excelência</strong> nesse corredor.
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 shrink-0 flex-grow">
                                        <div className="bg-blue-50/50 p-4 md:p-5 rounded-2xl border border-blue-50 flex flex-col justify-center">
                                            <Icon name="map-pin" className="text-sesi-blue mb-3" size={20} />
                                            <p className="text-xs font-bold text-slate-800 mb-1">Localização Estratégica</p>
                                            <p className="text-[10px] md:text-xs text-slate-500 leading-relaxed">Interseção entre o Leste Tradicional e os Condomínios de Alta Renda.</p>
                                        </div>
                                        <div className="bg-emerald-50/50 p-4 md:p-5 rounded-2xl border border-emerald-50 flex flex-col justify-center">
                                            <Icon name="trending-up" className="text-emerald-600 mb-3" size={20} />
                                            <p className="text-xs font-bold text-slate-800 mb-1">Crescimento Acelerado</p>
                                            <p className="text-[10px] md:text-xs text-slate-500 leading-relaxed">Expansão residencial contínua com forte atração de famílias jovens.</p>
                                        </div>
                                        <div className="bg-amber-50/30 p-4 md:p-5 rounded-2xl border border-amber-50 flex flex-col justify-center">
                                            <Icon name="target" className="text-amber-600 mb-3" size={20} />
                                            <p className="text-xs font-bold text-slate-800 mb-1">Demanda Reprimida</p>
                                            <p className="text-[10px] md:text-xs text-slate-500 leading-relaxed">Forte propensão a migrar para um modelo Premium Acessível.</p>
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        )}
                        {activeTab === 'realestate' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 h-full fade-in flex-grow">
                                <Card delay="0.1s" className="border-l-[6px] border-l-sesi-blue p-6 md:p-8">
                                    <div className="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center mb-6 text-sesi-blue border border-blue-100 shrink-0">
                                        <Icon name="briefcase" size={20} />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-3 shrink-0">Geração de Emprego Formal</h3>
                                    <p className="text-slate-500 text-sm mb-6 leading-relaxed flex-grow">Goiânia lidera o saldo de empregos formais no estado, sustentando a capacidade de pagamento das famílias para educação privada.</p>
                                    <div className="bg-slate-50/80 p-5 rounded-xl border border-slate-100 mt-auto shrink-0">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Saldo Goiânia (2025)</p>
                                        <p className="text-3xl font-black text-slate-800 tracking-tight">+14.138 <span className="text-sm text-slate-500 font-semibold tracking-normal">novas vagas</span></p>
                                    </div>
                                </Card>
                                <Card delay="0.2s" className="border-l-[6px] border-l-emerald-500 p-6 md:p-8">
                                    <div className="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center mb-6 text-emerald-600 border border-emerald-100 shrink-0">
                                        <Icon name="home" size={20} />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-3 shrink-0">Boom Imobiliário (Residencial)</h3>
                                    <p className="text-slate-500 text-sm mb-6 leading-relaxed flex-grow">A expansão dos condomínios horizontais ao longo da GO-020 e Alphaville ancora o público-alvo de alto poder aquisitivo no vetor Leste.</p>
                                    <div className="grid grid-cols-2 gap-3 mt-auto shrink-0">
                                        <div className="bg-slate-50/80 p-4 rounded-xl border border-slate-100">
                                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Vendas 2024</p>
                                            <p className="text-2xl font-black text-emerald-700 tracking-tight mb-2">R$ 7,7 Bi</p>
                                            <span className="text-[10px] font-bold text-emerald-700 bg-emerald-100/80 px-2 py-0.5 rounded inline-block">+35% a.a.</span>
                                        </div>
                                        <div className="bg-slate-50/80 p-4 rounded-xl border border-slate-100">
                                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">1º Sem. 2025</p>
                                            <p className="text-2xl font-black text-emerald-700 tracking-tight mb-2">R$ 4,1 Bi</p>
                                            <span className="text-[10px] font-bold text-emerald-700 bg-emerald-100/80 px-2 py-0.5 rounded inline-block">+21% a.a.</span>
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        )}
                        {activeTab === 'qualitative' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 h-full fade-in flex-grow">
                                <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4 h-full">
                                    <Card delay="0.1s" className="border-l-[4px] border-l-sesi-blue p-5 justify-center">
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-sesi-blue border border-blue-100"><Icon name="building" size={16}/></div>
                                            <h4 className="font-bold text-slate-800 text-sm">Força da Infraestrutura</h4>
                                        </div>
                                        <p className="text-xs text-slate-600 leading-relaxed">
                                            A infraestrutura verde e ampla foi vista como um diferencial escasso, gerando alto impacto positivo.
                                        </p>
                                    </Card>

                                    <Card delay="0.2s" className="border-l-[4px] border-l-emerald-500 p-5 justify-center">
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center text-emerald-600 border border-emerald-100"><Icon name="dollar-sign" size={16}/></div>
                                            <h4 className="font-bold text-slate-800 text-sm">Preço Competitivo</h4>
                                        </div>
                                        <p className="text-xs text-slate-600 leading-relaxed">
                                            A mensalidade proposta foi considerada atrativa, gerando predisposição à migração.
                                        </p>
                                    </Card>
                                    
                                    <Card delay="0.3s" className="border-l-[4px] border-l-amber-400 p-5 justify-center">
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center text-amber-600 border border-amber-100"><Icon name="brain" size={16}/></div>
                                            <h4 className="font-bold text-slate-800 text-sm">Metodologia vs. Tradição</h4>
                                        </div>
                                        <p className="text-xs text-slate-600 leading-relaxed">
                                            Forte apego ao modelo tradicional focado em vestibulares em paralelo à busca por inovação.
                                        </p>
                                    </Card>

                                    <Card delay="0.4s" className="border-l-[4px] border-l-purple-500 p-5 justify-center">
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="w-8 h-8 rounded-lg bg-purple-50 flex items-center justify-center text-purple-600 border border-purple-100"><Icon name="map-pin" size={16}/></div>
                                            <h4 className="font-bold text-slate-800 text-sm">Logística e Localização</h4>
                                        </div>
                                        <p className="text-xs text-slate-600 leading-relaxed">
                                            Localização na região dos Jardins é um trunfo gigante para fugir do trânsito.
                                        </p>
                                    </Card>
                                </div>
                                
                                <Card delay="0.5s" bg="bg-sesi-dark" className="lg:col-span-4 justify-center text-white border-none relative overflow-hidden p-6">
                                    <Icon name="shield-check" size={100} className="absolute -right-4 -bottom-4 text-white opacity-5" />
                                    <h3 className="text-lg font-bold mb-3 relative z-10">O Papel da Marca SESI</h3>
                                    <p className="text-xs text-blue-100 leading-relaxed relative z-10">
                                        A marca traz credibilidade e associação com tecnologia/robótica. O desafio é mostrar que atende ao perfil de alta renda (Jardins), mantendo a acessibilidade.
                                    </p>
                                </Card>
                            </div>
                        )}
                        {activeTab === 'positioning' && (
                            <div className="flex flex-col h-full fade-in flex-grow">
                                <Card className="flex-grow p-4 md:p-6 relative bg-slate-50 border-2 border-slate-200 justify-start">
                                    <h3 className="text-lg font-bold text-slate-800 mb-1 shrink-0">Mapeamento de Concorrência & Oceano Azul</h3>
                                    <p className="text-xs text-slate-500 mb-4 shrink-0">Cruzamento entre ticket médio e proposta de valor.</p>
                                    
                                    <div className="relative flex-grow border-l-2 border-b-2 border-slate-300 ml-6 mb-6 mt-2 bg-white rounded-tr-xl">
                                        <div className="absolute -left-6 top-1/2 -translate-y-1/2 -rotate-90 text-[9px] font-bold text-slate-400 uppercase tracking-widest whitespace-nowrap">Inovação / Infra</div>
                                        <div className="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-400 uppercase tracking-widest whitespace-nowrap">Preço</div>
                                        
                                        <div className="absolute -bottom-5 left-0 text-[8px] text-slate-400 font-bold">Acessível</div>
                                        <div className="absolute -bottom-5 right-0 text-[8px] text-slate-400 font-bold">Premium</div>
                                        <div className="absolute bottom-0 -left-5 text-[8px] text-slate-400 font-bold">Padrão</div>
                                        <div className="absolute top-0 -left-5 text-[8px] text-slate-400 font-bold">Alta</div>

                                        <div className="absolute left-1/2 top-0 bottom-0 w-px bg-slate-200 border-dashed border-l"></div>
                                        <div className="absolute top-1/2 left-0 right-0 h-px bg-slate-200 border-dashed border-t"></div>

                                        {bubbleData.map((bubble, i) => (
                                            <div key={i} className="absolute group" style={{ left: `${bubble.x}%`, bottom: `${bubble.y}%`, transform: 'translate(-50%, 50%)' }}>
                                                <div className={`flex items-center justify-center rounded-full ${bubble.color} shadow-lg cursor-pointer transition-transform duration-300 group-hover:scale-110 flex-col text-center p-1`} style={{ width: `${bubble.size * 0.8}px`, height: `${bubble.size * 0.8}px` }}>
                                                    <span className={`text-[8px] font-black leading-tight ${bubble.text} opacity-0 group-hover:opacity-100 transition-opacity`}>{bubble.id}</span>
                                                </div>
                                                
                                                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-56 bg-white border border-slate-200 p-3 rounded-xl shadow-2xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-20">
                                                    <p className={`text-[10px] font-black uppercase mb-1 ${bubble.color.replace('bg-', 'text-')}`}>{bubble.label}</p>
                                                    <p className="text-xs font-bold text-slate-800 mb-1">{bubble.price}</p>
                                                    <p className="text-[10px] text-slate-500 leading-tight">{bubble.schools}</p>
                                                </div>

                                                {/* Rótulos Permanentes Fixos */}
                                                <div className="absolute top-full mt-2 left-1/2 -translate-x-1/2 flex flex-col items-center pointer-events-none whitespace-nowrap z-10">
                                                    <span className="text-[9px] font-bold text-slate-700 bg-white/90 px-1.5 py-0.5 rounded shadow-sm border border-slate-100">{bubble.label}</span>

                { id: 2, title: "Singularidade", icon: "infinity", desc: "A convergência homem-máquina exigirá ética. A escola atua como o reduto da empatia, filosofia e conexões reais.", ods: [{ num: 3, name: "Saúde e Bem-Estar", color: "bg-[#4C9F38]" }, { num: 10, name: "Redução de Desigualdades", color: "bg-[#DD1367]" }] },
                { id: 3, title: "Robotização em Massa", icon: "bot", desc: "A automação de tarefas é realidade. O diferencial humano estará na criatividade, gestão de crises e adaptabilidade maker.", ods: [{ num: 8, name: "Trabalho Decente", color: "bg-[#A21942]" }, { num: 9, name: "Indústria, Inovação", color: "bg-[#FD6925]" }] },
                { id: 4, title: "Sustentabilidade Radical", icon: "leaf", desc: "Economia circular, bioengenharia e design regenerativo. Desafios de mitigação climática como projetos centrais.", ods: [{ num: 11, name: "Cidades Sustentáveis", color: "bg-[#FD9D24]" }, { num: 13, name: "Ação Climática", color: "bg-[#3F7E44]" }] },
                { id: 5, title: "Hiper-conectividade", icon: "network", desc: "Cidades verticais e presença ubíqua digital. A flexibilidade cognitiva será a habilidade primária dos estudantes.", ods: [{ num: 9, name: "Indústria, Inovação", color: "bg-[#FD6925]" }, { num: 11, name: "Cidades Sustentáveis", color: "bg-[#FD9D24]" }] }
            ];

            return (
                <div className="slide-content flex flex-col h-full fade-in">
                    <IntroParagraph 
                        title="O Futuro é o Nosso Currículo" 
                        highlight="Preparando para o Amanhã."
                        text="A Escola não foi projetada para o mundo de hoje, mas para forjar os cidadãos das próximas décadas."
                    />

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow min-h-0 mb-4">
                        {/* Tab List */}
                        <div className="lg:col-span-5 flex flex-col gap-2">
                            {signals.map((signal) => (
                                <button 
                                    key={signal.id} onClick={() => setActiveSignal(signal.id)}
                                    className={`flex items-center gap-3 w-full p-3 rounded-xl transition-all duration-300 text-left border flex-1 ${activeSignal === signal.id ? 'bg-sesi-blue text-white shadow-md border-blue-500 scale-[1.01]' : 'bg-white text-slate-600 border-slate-200 hover:border-blue-300 hover:bg-blue-50'}`}
                                >
                                    <div className={`flex items-center justify-center w-10 h-10 rounded-lg shrink-0 transition-colors ${activeSignal === signal.id ? 'bg-white/20 text-white' : 'bg-slate-100 text-sesi-dark'}`}>
                                        <Icon name={signal.icon} size={20} />
                                    </div>
                                    <span className={`font-black text-xs md:text-sm ${activeSignal === signal.id ? 'text-white' : 'text-slate-800'}`}>
                                        {signal.title}
                                    </span>
                                </button>
                            ))}
                        </div>

                        {/* Detailed View */}
                        <Card delay="0.1s" bg="bg-slate-50" className="lg:col-span-7 relative overflow-hidden flex flex-col justify-between border-2 border-slate-200 p-5 md:p-6">
                            <div className="absolute right-[-5%] bottom-[-10%] opacity-[0.03] text-sesi-dark pointer-events-none transition-all duration-700 transform scale-110">
                                <Icon name={signals[activeSignal].icon} size={250} />
                            </div>
                            
                            <div className="relative z-10 fade-in flex flex-col h-full" key={activeSignal}>
                                <div className="flex-grow flex flex-col justify-center">
                                    <div className="w-12 h-12 rounded-xl bg-white border border-slate-200 shadow-sm flex items-center justify-center mb-4 text-sesi-blue shrink-0">
                                        <Icon name={signals[activeSignal].icon} size={24} />
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-800 mb-3 leading-tight">{signals[activeSignal].title}</h3>
                                    <p className="text-sm text-slate-600 leading-relaxed font-medium">
                                        {signals[activeSignal].desc}
                                    </p>
                                </div>

                                <div className="mt-4 pt-4 border-t border-slate-200/80 shrink-0">
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 flex items-center gap-1.5">
                                        <Icon name="globe" size={12} /> Alinhamento Global (Agenda 2030)
                                    </p>
                                    <div className="flex flex-wrap gap-2">
                                        {signals[activeSignal].ods.map((ods, i) => (
                                            <div key={i} className={`flex items-center gap-1.5 px-2 py-1 rounded ${ods.color} text-white shadow-sm`}>
                                                <span className="font-black text-[9px] bg-white/20 px-1 py-0.5 rounded text-white">ODS {ods.num}</span>
                                                <span className="text-[10px] font-bold leading-tight whitespace-nowrap">{ods.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>
                    
                    {/* Trilha de Inovação */}
                    <div className="bg-sesi-dark p-4 md:p-5 rounded-[20px] shrink-0 flex flex-col lg:flex-row items-center justify-between text-white shadow-apple-floating border border-blue-400/20 gap-4">
                        <div className="lg:w-1/3">
                            <h4 className="text-base font-black mb-1 flex items-center gap-2"><Icon name="milestone" size={18} className="text-emerald-400"/> Trilha Contínua</h4>
                            <p className="text-[10px] text-blue-100 font-medium leading-relaxed">
                                O SESI atua como porta de entrada para a formação de excelência, conectando talentos precoces às <strong>Faculdades SENAI</strong> e centros de pesquisa <strong>(IST e ISI)</strong>.
                            </p>
                        </div>
                        
                        <div className="lg:w-2/3 w-full flex flex-col sm:flex-row items-center justify-end gap-2 relative">
                            <div className="hidden sm:block absolute top-1/2 left-2 right-2 h-0.5 bg-white/10 -z-0 -translate-y-1/2"></div>
                            
                            <div className="bg-blue-900/80 backdrop-blur border border-blue-400/30 px-3 py-2 rounded-lg text-center shadow-sm z-10 w-full sm:w-auto">
                                <p className="text-[8px] text-blue-200 font-bold uppercase tracking-wider mb-0.5">Passo 1</p>
                                <p className="text-[10px] font-black text-white">Básica (SESI)</p>
                            </div>
                            
                            <Icon name="arrow-right" size={16} className="hidden sm:block text-blue-300 z-10 shrink-0" />
                            
                            <div className="bg-blue-900/80 backdrop-blur border border-blue-400/30 px-3 py-2 rounded-lg text-center shadow-sm z-10 w-full sm:w-auto">
                                <p className="text-[8px] text-blue-200 font-bold uppercase tracking-wider mb-0.5">Passo 2</p>
                                <p className="text-[10px] font-black text-white">Graduação (SENAI)</p>
                            </div>
                            
                            <Icon name="arrow-right" size={16} className="hidden sm:block text-emerald-300 z-10 shrink-0" />
                            
                            <div className="bg-emerald-900/80 backdrop-blur border border-emerald-400/40 px-3 py-2 rounded-lg text-center shadow-sm z-10 w-full sm:w-auto ring-1 ring-emerald-500/50">
                                <p className="text-[8px] text-emerald-300 font-bold uppercase tracking-wider mb-0.5">Passo 3 (Pesquisa)</p>
                                <p className="text-[10px] font-black text-white">IST / ISI</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const CreditsSlide = () => {
            const leftCol = [
                { title: "Presidente FIEG", name: "André Luiz Baptista Lins Rocha" },
                { title: "Diretor Regional SENAI / Superintendente SESI", name: "Claudemir Bonatto" },
                { title: "Diretor de Educação e Tecnologia SESI SENAI", name: "Claudemir Bonatto" },
                { title: "Superintendente da FIEG", name: "Lenner Rocha" },
                { title: "Superintendente do IEL Goiás", name: "Humberto Rodrigues" },
            ];
            const rightCol = [
                { title: "Gerente de Educação Profissional do SENAI", name: "Osvair Almeida Matos" },
                { title: "Gerente de Educação Básica do SESI", name: "Diego Freire Vieira" },
                { title: "Gerente de Tecnologia e Inovação do SENAI", name: "Rolando Vargas Vallejos" },
                { title: "Gerente de Inovação e Soluções Digitais IEL", name: "Joel Matos" },
            ];

            return (
                <div className="slide-content flex flex-col items-center justify-center h-full w-full fade-in p-8">
                    
                    {/* Header Logos text base para replicar a imagem */}
                    <div className="flex flex-wrap justify-center items-end gap-x-6 gap-y-4 mb-12 shrink-0 opacity-100">
                        <span className="text-5xl md:text-6xl font-black italic tracking-tighter text-white drop-shadow-md">FIEG <span className="text-3xl md:text-4xl">75 <span className="text-sm md:text-base font-bold tracking-normal not-italic">ANOS</span></span></span>
                        <span className="text-5xl md:text-6xl font-black italic tracking-tighter text-white drop-shadow-md">SESI</span>
                        <span className="text-5xl md:text-6xl font-black italic tracking-tighter text-white drop-shadow-md">SENAI</span>
                        <span className="text-5xl md:text-6xl font-black italic tracking-tighter text-white drop-shadow-md">IEL</span>
                    </div>

                    <div className="flex flex-col md:flex-row gap-8 md:gap-16 w-full max-w-4xl mx-auto flex-grow items-center justify-center">
                        {/* Coluna Esquerda */}
                        <div className="flex-1 flex flex-col gap-6 w-full md:pr-8 text-left md:text-right">
                            {leftCol.map((item, i) => (
                                <div key={i} className="fade-in" style={{animationDelay: `${i*0.1}s`}}>
                                    <h4 className="font-bold text-sm md:text-base leading-tight text-white mb-0.5">{item.title}</h4>
                                    <p className="text-white/80 font-normal text-sm">{item.name}</p>
                                </div>
                            ))}
                        </div>

                        {/* Linha Divisória */}
                        <div className="hidden md:block w-px h-[60%] bg-white/20 self-center shrink-0"></div>
                        <div className="block md:hidden h-px w-3/4 bg-white/20 my-2 shrink-0 self-center"></div>

                        {/* Coluna Direita */}
                        <div className="flex-1 flex flex-col gap-6 w-full md:pl-8 text-left">
                            {rightCol.map((item, i) => (
                                <div key={i} className="fade-in" style={{animationDelay: `${(i+5)*0.1}s`}}>
                                    <h4 className="font-bold text-sm md:text-base leading-tight text-white mb-0.5">{item.title}</h4>
                                    <p className="text-white/80 font-normal text-sm">{item.name}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const slides = [
            { id: 'hero', title: "Início", component: <Hero />, bg: 'bg-white' },
            { id: 'market', title: "Mercado & Lacuna", component: <MarketAnalysis />, bg: 'bg-white' },
            { id: 'capex', title: "Investimento & CAPEX", component: <CapexStructure />, bg: 'bg-white' },
            { id: 'infra', title: "Infraestrutura", component: <InfraArchitecture />, bg: 'bg-white' },
            { id: 'ramp', title: "Matrículas & Formatos", component: <EnrollmentRamp />, bg: 'bg-white' },
            { id: 'dre', title: "Análise Financeira", component: <FinancialDRE />, bg: 'bg-white' },
            { id: 'future', title: "O Futuro & ODS", component: <FutureSignals />, bg: 'bg-white' },
            { id: 'credits', title: "Expediente", component: <CreditsSlide />, bg: 'bg-[#153B82]' },
        ];

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const isCredits = currentSlide === slides.length - 1;

            const nextSlide = () => { if (currentSlide < slides.length - 1) setCurrentSlide(curr => curr + 1); };
            const prevSlide = () => { if (currentSlide > 0) setCurrentSlide(curr => curr - 1); };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'Space') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide]);

            return (
                <div className="relative w-full h-screen bg-slate-50 flex flex-col items-center justify-center font-sans overflow-hidden">
                    
                    {/* Header Global Fixo */}
                    <div className="absolute top-0 left-0 w-full z-50 pointer-events-none flex flex-col items-center">
                        <div className="w-full max-w-[1500px] flex justify-between items-center px-4 md:px-10 py-4 md:py-6 relative">
                            
                            {/* Título */}
                            <div className={`flex items-center gap-2 md:gap-3 font-black text-base md:text-lg pointer-events-auto backdrop-blur-lg px-5 py-2.5 rounded-xl shadow-sm border transition-colors duration-500 ${isCredits ? 'bg-[#0E285D]/80 text-white border-white/20' : 'bg-white/90 text-sesi-dark border-slate-200'}`}>
                                <Icon name="graduation-cap" className={isCredits ? 'text-white' : 'text-sesi-blue'} size={24} />
                                <span className="hidden sm:inline">SESI Jardins</span>
                            </div>

                            {/* Menu de Navegação Central */}
                            <div className="absolute left-1/2 -translate-x-1/2 top-20 md:top-1/2 md:-translate-y-1/2 pointer-events-auto w-[95%] md:w-auto overflow-x-hidden">
                                <div className={`flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-1.5 backdrop-blur-lg p-1.5 rounded-xl shadow-sm border min-w-max mx-auto transition-colors duration-500 ${isCredits ? 'bg-[#0E285D]/80 border-white/20' : 'bg-white/90 border-slate-200'}`}>
                                    {slides.map((slide, idx) => (
                                        <button 
                                            key={idx} onClick={() => setCurrentSlide(idx)}
                                            className={`px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold transition-all whitespace-nowrap ${currentSlide === idx ? (isCredits ? 'bg-white text-[#153B82] shadow-md' : 'bg-sesi-blue text-white shadow-md') : (isCredits ? 'text-white/70 hover:text-white hover:bg-white/10' : 'text-slate-500 hover:text-slate-900 hover:bg-slate-100')}`}
                                        >
                                            {slide.title}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Logomarca Superior Direita (Fixa em todas as páginas) */}
                            <div className={`pointer-events-auto backdrop-blur-lg px-4 py-2.5 rounded-xl shadow-sm border flex items-center justify-center transition-colors duration-500 ${isCredits ? 'bg-[#0E285D]/80 border-white/20' : 'bg-white/90 border-slate-200'}`}>
                                <img src="https://i.postimg.cc/3Jy5sCYP/Fieg-SESI.png" alt="FIEG SESI" className={`h-6 md:h-8 object-contain transition-all duration-500 ${isCredits ? 'brightness-0 invert' : ''}`} />
                            </div>

                        </div>
                    </div>

                    {/* Nav Buttons (Setas laterais) */}
                    <div className="absolute left-2 md:left-4 z-40">
                        <button onClick={prevSlide} disabled={currentSlide === 0} className={`w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md shadow-apple-floating border transition-all ${currentSlide === 0 ? 'opacity-0 translate-x-4 pointer-events-none' : 'opacity-100 hover:scale-110'} ${isCredits ? 'bg-[#0E285D]/80 border-white/20 text-white hover:border-white' : 'bg-white/95 border-slate-200 text-slate-800 hover:border-sesi-blue hover:text-sesi-blue'}`}>
                            <Icon name="chevron-left" size={24} />
                        </button>
                    </div>

                    <div className="absolute right-2 md:right-4 z-40">
                        <button onClick={nextSlide} disabled={isCredits} className={`w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md shadow-apple-floating border transition-all ${isCredits ? 'opacity-0 -translate-x-4 pointer-events-none' : 'opacity-100 hover:scale-110 hover:border-sesi-blue hover:text-sesi-blue'} ${isCredits ? 'bg-[#0E285D]/80 border-white/20 text-white hover:border-white' : 'bg-white/95 border-slate-200 text-slate-800'}`}>
                            <Icon name="chevron-right" size={24} />
                        </button>
                    </div>

                    {/* Main Canvas Widescreen (Altura ajustada para evitar rolagem interna) */}
                    <div className="w-full max-w-[1500px] h-[92vh] max-h-[900px] px-2 md:px-10 pt-24 md:pt-20 pb-4 md:pb-6 z-30">
                        <div className="w-full h-full rounded-[32px] shadow-apple-floating overflow-hidden border border-slate-200/60 relative">
                            <div className="flex w-full h-full slide-transition" style={{ transform: `translateX(-${currentSlide * 100}%)` }}>
                                {slides.map((slide, idx) => (
                                    <div key={idx} className={`w-full h-full flex-shrink-0 p-5 md:p-8 lg:p-10 slide-content relative flex flex-col transition-colors duration-700 ${slide.bg}`}>
                                        {slide.component}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
